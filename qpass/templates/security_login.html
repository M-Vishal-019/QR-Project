<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            border : border-box;
            padding: 0px;
            margin : 0px;
        }
         header {
            height : 112px;
            background-color: blue;
            display: flex;
            flex-wrap: wrap;
            background-image: url("{% static 'background.jpeg' %}");
            background-size: cover;
            border-bottom: 2px solid black;
            width : 100vw;
            position: relative;
            right: 10px;
            bottom: 7px;
            margin-left: 0.6%;
        }

        main {
            width: 100vw;
            height: 80vh;
        }

        #collegeName {
            font-family: 'Times New Roman', Times, serif;
            font-size: 2.8vw;
            font-weight: 600;
            position: absolute;
            right : 5%;
            top:14px;
        }

        #Address {
            color: rgb(24, 3, 121);
            position: absolute;
            left: 30%;
            bottom: 5%;
            font-size: 1.8vw;
        }

        #container{
            height : 55%;
            width :20%;
            border: 3px solid black;
            border-radius: 5%;
            position: absolute;
            left: 39%;
            top : 30%;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items:center ;
        }

        #login {
            font-size: 2.5rem;
            font-weight: 600;
            position: absolute;
            top : 5%;
        }

        #staff_id_label {
            font-size: 1.5rem;
            font-family: 'Times New Roman', Times, serif;
            font-weight: 500;
            position: absolute;
            top : 25%;
            left : 36%;
        }

        #staff_id_input {
            width : 75%;
            height: 20px;
            position: absolute;
            top : 34%;
            left : 10%;
        }

        #staff_password_label {
            font-size: 1.5rem;
            font-family: 'Times New Roman', Times, serif;
            font-weight: 500;
            position: absolute;
            top : 50%;
            left : 35%;
        }

        #staff_password_input {
            width : 75%;
            height: 20px;
            position: absolute;
            top : 60%;
            left : 10%;
        }

        a {
            text-decoration: none;
            color: black;
            position: relative;
            left : 30px;
            top : 5px;
        }

        #button {
            width : 100px;
            height:30px;
            background-color: antiquewhite;
            position: absolute;
            top : 75%;
            border : 1px solid black;
            border-radius: 10%;
            right : 35%;
        }

        #nav {
            display: inline;
            position: fixed;
            top : 180px;
            left : 690px;
        }

        .nav{
            font-weight: 600;
            font-size: 2rem;
        }

        body {
            
            background-image: url("{% static '05.jpg.jpeg' %}");
            background-size: cover;
        }
        
    </style>
</head>
<body>
    <header>
        <img id="collegeLogo" src="	https://jntuhces.ac.in/resp/images_new/jntuhlogo.png" alt="jntuhces logo">
        <div id="collegeName">JNTUH UNIVERSITY COLLEGE OF ENGINEERING - SULTANPUR</div>
        <div id="Address">Sulthanpur (V), Pulkal (M), Sangareddy (D), (T.G)-502 273.</div>
    </header>

    <main>
        <div id="nav">
            <a class="nav" href="security_login.html">Staff</a>
        </div>
        <div id="container">
            <h2 id="login">Login</h2>

            {% if error %}
                <p style="color: red; position: absolute; top: 18%; font-weight: bold;">{{ error }}</p>
            {% endif %}

            <form method="POST" style="width: 100%; height: 100%;">
                {% csrf_token %}
                <div id="staff_id">
                    <p id="staff_id_label">Staff Id</p>
                    <input id="staff_id_input" name="staff_id" type="text" placeholder="Staff Id" required>
                </div>

                <div id="staff_password">
                    <p id="staff_password_label">Password</p>
                    <input id="staff_password_input" name="password" type="password" placeholder="Password" required>
                </div>
                <button type="submit" id="button">Login</button>
            </form>
        </div>
    </main>
</body>
</html>
